    <main class="container my-5">
      <h2 class="text-center fw-bold mb-3" style="color: #b57c3a">
        Formulir Pemesanan Jajanan
      </h2>
      <div class="text-center mb-4">
        <a href="index.html" class="btn btn-sm btn-outline-secondary"
          >Beranda</a
        >
      </div>

      <div class="form-container p-4 p-md-5 mx-auto" style="max-width: 750px">
        <form action="#" method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label for="namaLengkap" class="form-label fw-bold"
              >Nama Lengkap Pembeli</label
            >
            <input
              type="text"
              class="form-value form-control"
              id="namaLengkap"
              required
            />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-bold">Email Aktif</label>
            <input type="email" class="form-control" id="email" required />
          </div>

         
          <div class="mb-3">
            <label class="form-label d-block fw-bold">Metode Pengiriman</label>
            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="radio"
                name="metodeKirim"
                id="ambilSendiri"
                value="ambil"
                checked
              />
              <label class="form-check-label" for="ambilSendiri"
                >Ambil Sendiri</label
              >
            </div>
            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="radio"
                name="metodeKirim"
                id="antarKurir"
                value="kurir"
              />
              <label class="form-check-label" for="antarKurir"
                >Antar Kurir</label
              >
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label d-block fw-bold">Tambahan Toping</label>
            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="checkbox"
                id="topingKelapa"
                value="kelapa"
              />
              <label class="form-check-label" for="topingKelapa"
                >Parutan Kelapa</label
              >
            </div>
            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="checkbox"
                id="topingGula"
                value="gula"
              />
              <label class="form-check-label" for="topingGula"
                >Ekstra Gula Cair</label
              >
            </div>
            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="checkbox"
                id="topingWijen"
                value="wijen"
              />
              <label class="form-check-label" for="topingWijen"
                >Biji Wijen</label
              >
            </div>
          </div>

          <div class="mb-3">
            <label for="cabang" class="form-label fw-bold"
              >Pilih Lokasi Cabang:</label
            >
            <select class="form-select" id="cabang">
              <option selected>Komplek Pasar Besar Palangka Raya</option>
              <option value="1">Cabang Menteng</option>
              <option value="2">Cabang Yos Sudarso</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="alamat" class="form-label fw-bold"
              >Alamat Lengkap</label
            >
            <textarea
              class="form-control"
              id="alamat"
              rows="3"
              placeholder="Isi jika memilih antar kurir..."
            ></textarea>
          </div>

          <div class="mb-3" style="max-width: 200px">
            <label for="jumlah" class="form-label fw-bold"
              >Jumlah Pesanan</label
            >
            <input
              type="number"
              class="form-control"
              id="jumlah"
              min="1"
              required
            />
          </div>

          <div class="mb-3" style="max-width: 250px">
            <label for="tanggal" class="form-label fw-bold"
              >Tanggal Pengambilan/Pengantaran:</label
            >
            <input type="date" class="form-control" id="tanggal" required />
          </div>

          <div class="mb-4">
            <label for="buktiBayar" class="form-label fw-bold"
              >Upload Bukti Bayar</label
            >
            <input class="form-control" type="file" id="buktiBayar" />
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-kirim px-4">
              Kirim Pesanan
            </button>
            <button type="reset" class="btn btn-secondary px-4">
              Hapus Isi Form
            </button>
          </div>
        </form>
      </div>
